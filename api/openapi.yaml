  /api/v1/auth/password-reset/confirm:
    post:
      description: Resets the user's password using a token previously emailed to
        them. The token is single-use; subsequent submissions return an error.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthPasswordResetConfirmRequest"
        description: Reset token plus new password and confirmation
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
