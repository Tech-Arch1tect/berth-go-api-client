  /api/v1/auth/refresh:
    post:
      description: Exchanges a valid refresh token for new access and refresh tokens.
        Implements token rotation - the old refresh token is invalidated. The refresh
        token may be supplied either in the request body's `refresh_token` field (mobile/CLI)
        or via the `berth_refresh` cookie (browser); when both are present the body
        wins. The rotated refresh token is written back to the `berth_refresh` cookie
        so browser clients stay current after rotation.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRefreshRequest"
        description: Refresh token (optional - may be supplied via berth_refresh cookie
          instead)
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_AuthRefreshData"
          description: New access and refresh tokens
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Invalid request format
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Invalid or expired refresh token
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Token refresh failed
        default:
          description: ""
      summary: Refresh access token
      tags:
      - auth
