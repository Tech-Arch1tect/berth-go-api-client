  /ws/api/servers/{serverid}/stacks/{stackname}/events:
    get:
      description: "Upgrades to a WebSocket and pushes container_status and stack_status\
        \ events for the named stack. The URL is the subscription: the stream is one-directional\
        \ and any client data frame closes the connection. Authenticate with an Authorization\
        \ Bearer header or the Bearer WebSocket subprotocol."
      parameters:
      - description: Server ID
        explode: false
        in: path
        name: serverid
        required: true
        schema:
          type: integer
        style: simple
      - description: Stack name
        explode: false
        in: path
        name: stackname
        required: true
        schema:
          type: string
        style: simple
      responses:
        "101":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_ws_api_servers__serverid__stacks__stackname__events_get_101_response"
          description: WebSocket stream of ContainerStatusEvent and StackStatusEvent
            messages
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Not authenticated
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Insufficient permissions
        default:
          description: ""
      security:
      - bearerAuth: []
      - apiKey: []
      summary: Per-stack status event stream (WebSocket)
      tags:
      - websocket
      x-websocket: true
  /ws/api/servers/{serverid}/stacks/{stackname}/operations/{operationId}:
    get:
      description: "Upgrades to a WebSocket and pushes the named operation's output\
        \ as StreamMessage frames (stdout, stderr, progress, complete, error). Requires\
        \ the same permission that starting the operation required. The stream is\
        \ one-directional and any client data frame closes the connection. Authenticate\
        \ with an Authorization Bearer header or the Bearer WebSocket subprotocol."
      parameters:
      - description: Server ID
        explode: false
        in: path
        name: serverid
        required: true
        schema:
          type: integer
        style: simple
      - description: Stack name
        explode: false
        in: path
        name: stackname
        required: true
        schema:
          type: string
        style: simple
      - description: Operation ID returned by the start-operation endpoint
        explode: false
        in: path
        name: operationId
        required: true
        schema:
          type: string
        style: simple
      responses:
        "101":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamMessage"
          description: WebSocket stream of StreamMessage frames
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Not authenticated
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Insufficient permissions
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Operation not found on this server and stack
        default:
          description: ""
      security:
      - bearerAuth: []
      - apiKey: []
      summary: Operation output stream (WebSocket)
      tags:
      - websocket
      x-websocket: true
  /ws/api/servers/{serverid}/stacks/{stackname}/terminal:
    get:
      description: "Upgrades to a bidirectional WebSocket proxied to a terminal session\
        \ in one of the stack's containers. The client sends TerminalStartMessage\
        \ to open a session, then TerminalInputMessage, TerminalResizeMessage and\
        \ TerminalCloseMessage; the server pushes TerminalSuccessMessage, TerminalOutputMessage,\
        \ TerminalCloseMessage and TerminalErrorMessage. A terminal_start naming a\
        \ stack other than the URL's is refused. Authenticate with an Authorization\
        \ Bearer header or the Bearer WebSocket subprotocol."
      parameters:
      - description: Server ID
        explode: false
        in: path
        name: serverid
        required: true
        schema:
          type: integer
        style: simple
      - description: Stack name
        explode: false
        in: path
        name: stackname
        required: true
        schema:
          type: string
        style: simple
      responses:
        "101":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_ws_api_servers__serverid__stacks__stackname__terminal_get_101_response"
          description: WebSocket terminal session frames (both directions)
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Not authenticated
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Insufficient permissions
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Server not found
        "502":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Agent terminal unreachable
        default:
          description: ""
      security:
      - bearerAuth: []
      - apiKey: []
      summary: Interactive container terminal (WebSocket)
      tags:
      - websocket
      x-websocket: true
