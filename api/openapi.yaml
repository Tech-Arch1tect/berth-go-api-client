  /api/v1/auth/login:
    post:
      description: "Authenticates a user with username and password. The 200 response\
        \ is one of two shapes: AuthLoginData (full access and refresh tokens, plus\
        \ user info) when login completes immediately, or AuthTOTPRequiredData (totp_required=true\
        \ with a temporary token) when TOTP is enabled and the caller must complete\
        \ /auth/totp/verify next. Clients should branch on the totp_required field.\
        \ On full success the response also sets a `berth_refresh` cookie (HttpOnly,\
        \ Secure, SameSite=Strict, Path=/api/v1/auth) carrying the refresh token for\
        \ browser clients; mobile/CLI clients can keep using the body-returned `refresh_token`."
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
        description: Login credentials
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/_api_v1_auth_login_post_200_response"
          description: Login outcome — full tokens or a TOTP challenge
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Invalid request format
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Invalid credentials
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Email not verified
        default:
          description: ""
      summary: Login with username and password
      tags:
      - auth
  /api/v1/auth/logout:
    post:
      description: "Revokes the access token (from the `Authorization` header) and\
        \ the refresh token, effectively logging the user out. The refresh token may\
        \ be supplied either in the request body's `refresh_token` field (mobile/CLI)\
        \ or via the `berth_refresh` cookie (browser); when both are present the body\
        \ wins. The `berth_refresh` cookie is always cleared on the response."
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLogoutRequest"
        description: Refresh token to revoke (optional - may be supplied via berth_refresh
          cookie instead)
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_AuthLogoutData"
          description: Logout successful
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Invalid request format
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Failed to revoke tokens
        default:
          description: ""
      security:
      - bearerAuth: []
      - session: []
      summary: Logout and revoke tokens
      tags:
      - auth
  /api/v1/auth/password-reset:
    post:
      description: Sends a password reset email to the supplied address if an account
        exists. Always returns 200 with a generic message to prevent account enumeration.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthPasswordResetRequest"
