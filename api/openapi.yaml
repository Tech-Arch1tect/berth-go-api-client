          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_SecurityAuditLogInfo2"
          description: Security audit log details
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Invalid log ID
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Not authenticated
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Admin access required
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Log not found
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Internal server error
        default:
          description: ""
      security:
      - bearerAuth: []
      - apiKey: []
      - session: []
      summary: Get security audit log details
      tags:
      - admin
  /api/v1/admin/servers:
    get:
      description: Returns list of all servers. Requires admin access.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_AdminListServersData"
          description: List of servers
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Not authenticated
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Admin access required
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Internal server error
        default:
          description: ""
      security:
      - bearerAuth: []
      - apiKey: []
      - session: []
      summary: List all servers
      tags:
      - admin
    post:
      description: Create a new server connection. Requires admin access.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServerCreateRequest"
        description: Server details
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_AdminCreateServerData"
          description: Server created
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Invalid request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Not authenticated
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Admin access required
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Internal server error
        default:
          description: ""
      security:
