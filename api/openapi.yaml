          description: Generic acknowledgement (regardless of account state)
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Invalid request format
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Failed to send verification email
