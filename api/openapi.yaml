          description: "Invalid request, invalid/expired/used token, or weak password"
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Password reset failed
        "503":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Password reset is disabled
        default:
          description: ""
      summary: Complete a password reset
      tags:
