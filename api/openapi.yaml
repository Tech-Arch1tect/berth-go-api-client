openapi: 3.0.3
info:
  description: "Berth: Opinionated docker compose stack management API"
  license:
    name: GPL-2.0
    url: https://www.gnu.org/licenses/old-licenses/gpl-2.0.html
  title: Berth API
  version: 1.0.0
servers:
- url: /
tags:
- description: Authentication endpoints
  name: auth
- description: Server management
  name: servers
- description: Docker stacks
  name: stacks
- description: Operation execution
  name: operations
- description: Stack file management
  name: files
- description: Container and operation logs
  name: logs
- description: Administrative operations
  name: admin
paths:
  /api/v1/admin/migration/export:
    post:
      description: "Export all configuration data (users, roles, servers, etc.) as\
        \ an encrypted backup file. Requires admin.system.export permission."
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportRequest"
        description: Export password (min 12 characters)
        required: true
      responses:
        "200":
          content:
            application/octet-stream:
              schema:
                format: binary
                type: string
          description: Encrypted backup file
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Invalid request or password too short
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Not authenticated
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Admin access required
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Export failed
        default:
          description: ""
      security:
      - bearerAuth: []
      - apiKey: []
      - session: []
      summary: Export data
      tags:
      - admin
  /api/v1/admin/migration/import:
    post:
      description: "Import configuration data from an encrypted backup file. WARNING:\
        \ This will completely replace all existing data. Requires admin.system.import\
        \ permission."
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/_api_v1_admin_migration_import_post_request"
        description: Backup file and decryption password
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_ImportData"
          description: Import completed successfully
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Invalid request or missing file/password
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Not authenticated
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Admin access required
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Import failed
        default:
          description: ""
      security:
      - bearerAuth: []
      - apiKey: []
      - session: []
      summary: Import data
      tags:
      - admin
  /api/v1/admin/operation-logs:
    get:
      description: Returns paginated list of all operation logs. Requires admin permissions.
      parameters:
      - description: Page number
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          minimum: 1
          type: integer
        style: form
      - description: Number of items per page
        explode: true
        in: query
        name: page_size
        required: false
        schema:
          default: 20
          maximum: 100
          minimum: 1
          type: integer
        style: form
      - description: "Search term for stack name, command, or operation ID"
        explode: true
        in: query
        name: search
        required: false
        schema:
          type: string
        style: form
      - description: Filter by server ID
        explode: true
        in: query
        name: server_id
        required: false
        schema:
          type: string
        style: form
      - description: Filter by stack name (partial match)
        explode: true
        in: query
        name: stack_name
        required: false
        schema:
          type: string
        style: form
      - description: Filter by command
        explode: true
        in: query
        name: command
        required: false
        schema:
          type: string
        style: form
      - description: Filter by status
        explode: true
        in: query
        name: status
        required: false
        schema:
          enum:
          - complete
          - incomplete
          - failed
          - success
          type: string
        style: form
      - description: Only return logs from the last N days
        explode: true
        in: query
        name: days_back
        required: false
        schema:
          minimum: 1
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_OperationLogInfo"
          description: Paginated list of operation logs
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Not authenticated
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Admin access required
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Internal server error
        default:
          description: ""
      security:
      - bearerAuth: []
      - apiKey: []
      - session: []
      summary: List all operation logs
      tags:
      - admin
  /api/v1/admin/operation-logs/stats:
    get:
      description: Returns aggregated statistics for all operation logs. Requires
        admin permissions.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_OperationLogStatsData"
          description: Operation logs statistics
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Not authenticated
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Admin access required
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Internal server error
        default:
          description: ""
      security:
      - bearerAuth: []
      - apiKey: []
      - session: []
      summary: Get operation logs statistics
      tags:
      - admin
  /api/v1/admin/operation-logs/{id}:
    get:
      description: Returns detailed information about a specific operation log including
        all messages. Requires admin permissions.
      parameters:
      - description: Operation log ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_OperationLogDetailData"
          description: Operation log details with messages
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Invalid operation log ID
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Not authenticated
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Admin access required
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Operation log not found
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Internal server error
        default:
          description: ""
      security:
      - bearerAuth: []
      - apiKey: []
      - session: []
      summary: Get operation log details
      tags:
      - admin
  /api/v1/admin/permissions:
    get:
      description: Returns list of all permissions. Use ?type=role to filter out API-key-only
        permissions. Requires admin access.
      parameters:
      - description: Filter type - use 'role' to exclude API-key-only permissions
        explode: true
        in: query
        name: type
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_ListPermissionsData"
          description: List of permissions
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Not authenticated
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Admin access required
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Internal server error
        default:
          description: ""
      security:
      - bearerAuth: []
      - apiKey: []
      - session: []
      summary: List all permissions
      tags:
      - admin
  /api/v1/admin/roles:
    get:
      description: List all roles. Requires admin permissions.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_ListRolesData"
          description: List of roles
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Not authenticated
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Admin access required
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Internal server error
        default:
          description: ""
      security:
      - bearerAuth: []
      - apiKey: []
      - session: []
      summary: List all roles
      tags:
      - admin
    post:
      description: Creates a new role. Requires admin permissions.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRoleRequest"
        description: Role details
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_RoleWithPermissions"
          description: Role created successfully
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Invalid request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Not authenticated
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Admin access required
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Internal server error
        default:
          description: ""
      security:
      - bearerAuth: []
      - apiKey: []
      - session: []
      summary: Create a new role
      tags:
      - admin
  /api/v1/admin/roles/{id}:
    delete:
      description: Deletes a role. Requires admin permissions.
      parameters:
      - description: Role ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_MessageData"
          description: Role deleted successfully
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Invalid request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Not authenticated
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Admin access required
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Internal server error
        default:
          description: ""
      security:
      - bearerAuth: []
      - apiKey: []
      - session: []
      summary: Delete a role
      tags:
      - admin
    put:
      description: Updates an existing role. Requires admin permissions.
      parameters:
      - description: Role ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRoleRequest"
        description: Role details
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_RoleWithPermissions"
          description: Role updated successfully
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Invalid request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Not authenticated
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Admin access required
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Internal server error
        default:
          description: ""
      security:
      - bearerAuth: []
      - apiKey: []
      - session: []
      summary: Update a role
      tags:
      - admin
  /api/v1/admin/roles/{roleId}/stack-permissions:
    get:
      description: "Returns the role details, available servers, permissions, and\
        \ current permission rules. Requires admin permissions."
      parameters:
      - description: Role ID
        explode: false
        in: path
        name: roleId
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_ListRoleStackPermissionsData"
          description: Role stack permissions
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Cannot manage permissions for admin role
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Not authenticated
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Admin access required
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Role not found
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Internal server error
        default:
          description: ""
      security:
      - bearerAuth: []
      - apiKey: []
      - session: []
      summary: List role stack permissions
      tags:
      - admin
    post:
      description: Creates a new permission rule for a role on a server with a stack
        pattern. Requires admin permissions.
      parameters:
      - description: Role ID
        explode: false
        in: path
        name: roleId
        required: true
        schema:
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStackPermissionRequest"
        description: Permission rule details
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_MessageData"
          description: Permission rule created
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Invalid request or permission already exists
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Not authenticated
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Admin access required
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Internal server error
        default:
          description: ""
      security:
      - bearerAuth: []
      - apiKey: []
      - session: []
      summary: Create a role stack permission
      tags:
      - admin
  /api/v1/admin/roles/{roleId}/stack-permissions/{permissionId}:
    delete:
      description: Deletes a permission rule from a role. Requires admin permissions.
      parameters:
      - description: Role ID
        explode: false
        in: path
        name: roleId
        required: true
        schema:
          type: integer
        style: simple
      - description: Permission rule ID
        explode: false
        in: path
        name: permissionId
        required: true
        schema:
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_MessageData"
          description: Permission rule deleted
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Invalid request
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Not authenticated
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Admin access required
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Internal server error
        default:
          description: ""
      security:
      - bearerAuth: []
      - apiKey: []
      - session: []
      summary: Delete a role stack permission
      tags:
      - admin
  /api/v1/admin/security-audit-logs:
    get:
      description: Returns paginated list of security audit logs. Requires admin permissions.
      parameters:
      - description: Page number
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          minimum: 1
          type: integer
        style: form
      - description: Number of items per page
        explode: true
        in: query
        name: per_page
        required: true
        schema:
          minimum: 1
          type: integer
        style: form
      - description: Filter by event type
        explode: true
        in: query
        name: event_type
        required: false
        schema:
          type: string
        style: form
      - description: Filter by event category
        explode: true
        in: query
        name: event_category
        required: false
        schema:
          type: string
        style: form
      - description: Filter by severity
        explode: true
        in: query
        name: severity
        required: false
        schema:
          type: string
        style: form
      - description: Filter by actor user ID
        explode: true
        in: query
        name: actor_user_id
        required: false
        schema:
          type: string
        style: form
      - description: Filter by success status (true/false)
        explode: true
        in: query
        name: success
        required: false
        schema:
          type: string
        style: form
      - description: Filter by start date (RFC3339 format)
        explode: true
        in: query
        name: start_date
        required: false
        schema:
          type: string
        style: form
      - description: Filter by end date (RFC3339 format)
        explode: true
        in: query
        name: end_date
        required: false
        schema:
          type: string
        style: form
      - description: "Search in actor username, target name, or event type"
        explode: true
        in: query
        name: search
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_SecurityAuditLogInfo"
          description: Paginated list of security audit logs
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Invalid request parameters
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Not authenticated
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Admin access required
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Internal server error
        default:
          description: ""
      security:
      - bearerAuth: []
      - apiKey: []
      - session: []
      summary: List security audit logs
      tags:
      - admin
  /api/v1/admin/security-audit-logs/stats:
    get:
      description: Returns aggregated statistics for security audit logs. Requires
        admin permissions.
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_StatsResponseData"
          description: Security audit statistics
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Not authenticated
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Admin access required
        "500":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response_Empty"
          description: Internal server error
        default:
          description: ""
      security:
      - bearerAuth: []
      - apiKey: []
      - session: []
      summary: Get security audit statistics
      tags:
      - admin
  /api/v1/admin/security-audit-logs/{id}:
    get:
      description: Returns detailed information about a specific security audit log.
        Requires admin permissions.
      parameters:
      - description: Security audit log ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: integer
        style: simple
      responses:
